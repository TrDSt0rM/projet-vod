version: '3.8'

services:

  mariadb:
    image: mariadb:11
    container_name: vod-mariadb
    restart: always
    environment:
      MARIADB_ROOT_PASSWORD: root
      MARIADB_DATABASE: vod_db
      MARIADB_USER: vod_user
      MARIADB_PASSWORD: vod_pass
    ports:
      - "3307:3306"
    volumes:
      - mariadb_data:/var/lib/mysql

volumes:
  mariadb_data: