server:
  port: ${SERVER_PORT:9000}

spring:
  application:
    name: gateway-service
  cloud:
    gateway:
      globalcors:
        corsConfigurations:
          '[/**]':
            allowedOrigins: "${FRONTEND_URL:http://localhost:5173}"
            allowedMethods:
              - GET
              - POST
              - PUT
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

      routes:
        - id: scraping-api
          uri: ${SCRAPING_API_URL:http://localhost:8080}
          predicates:
            - Path=/api/scraping/**

        - id: auth-api
          uri: ${AUTH_API_URL:http://localhost:8082}
          predicates:
            - Path=/api/auth/**

        - id: payment-api
          uri: ${PAYMENT_API_URL:http://localhost:8081}
          predicates:
            - Path=/api/payment/**

        - id: artist-api
          uri: ${ARTIST_API_URL:http://localhost:8083}
          predicates:
            - Path=/api/artistes/**